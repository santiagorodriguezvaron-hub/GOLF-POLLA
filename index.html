<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Polla</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🏌️ Golf Polla</h1>

    <div class="card">

        <h2>Configuración</h2>

        <label>Valor de la apuesta</label>

        <select id="bet">
            <option value="50000">$50.000</option>
            <option value="75000">$75.000</option>
        </select>

        <label>Número de jugadores</label>

        <input
            type="number"
            id="players"
            min="2"
            value="18">

        <hr>

        <label>Pozo total</label>

        <input
            type="text"
            id="pozo"
            readonly>

        <label>10% sugerido para cervezas</label>

        <input
            type="text"
            id="cervezaSugerida"
            readonly>

        <label>Valor final para cervezas</label>

        <input
            type="number"
            id="cervezas"
            step="1000">

        <label>Premios a repartir</label>

        <input
            type="text"
            id="premios"
            readonly>

    </div>

    <div class="card">

        <h2>Resultados</h2>

        <p>
            Por ahora escriba los resultados así:
            <br><br>
            Santiago 67
            <br>
            Martín 68
            <br>
            Juan 69
        </p>

        <h3>General</h3>

        <textarea
            id="general"
            rows="6"></textarea>

        <h3>Primera vuelta</h3>

        <textarea
            id="ida"
            rows="6"></textarea>

        <h3>Segunda vuelta</h3>

        <textarea
            id="vuelta"
            rows="6"></textarea>

        <button id="btnCalcular">

            🏆 Liquidar Polla

        </button>

    </div>

    <div class="card">

        <h2>Resultado</h2>

        <div id="resultado">

            Esperando cálculo...

        </div>

    </div>

</div>

<script src="calculator.js"></script>
<script src="script.js"></script>

</body>
</html>
