<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Polla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🏌️ Golf Polla</h1>

    <div class="card">

        <h2>Configuración</h2>

        <label>Número de jugadores</label>
        <input id="players" type="number" min="2" value="18">

        <label>Valor apuesta</label>
        <select id="bet">
            <option value="20000">$20.000</option>
            <option value="30000">$30.000</option>
            <option value="50000" selected>$50.000</option>
            <option value="100000">$100.000</option>
        </select>

    </div>

    <div class="card resumen">

        <div class="dato">
            <span>💰 Pozo</span>
            <input id="pozo" readonly>
        </div>

        <div class="dato">
            <span>🍺 10% sugerido</span>
            <input id="cervezaSugerida" readonly>
        </div>

        <div class="dato">
            <span>🍻 Cervezas</span>
            <input id="cervezas" type="number" step="1000">
        </div>

        <div class="dato">
            <span>🏆 Premios</span>
            <input id="premios" readonly>
        </div>

    </div>

    <div class="card">

        <h2>General</h2>

        <textarea
            id="general"
            rows="10"
            placeholder="Santiago 67&#10;Martin 68&#10;Juan 69"></textarea>

    </div>

    <div class="card">

        <h2>Primera vuelta</h2>

        <textarea
            id="ida"
            rows="10"
            placeholder="Santiago 33&#10;Martin 34"></textarea>

    </div>

    <div class="card">

        <h2>Segunda vuelta</h2>

        <textarea
            id="vuelta"
            rows="10"
            placeholder="Santiago 34&#10;Martin 35"></textarea>

    </div>

    <button id="btnCalcular">
        🏆 LIQUIDAR POLLA
    </button>

    <!-- NUEVO -->
    <div id="cardsGanadores"></div>

    <!-- TABLA -->
    <div id="resultado"></div>

    <!-- NUEVO -->
    <button id="btnWhatsapp" style="display:none;">
        📋 Copiar para WhatsApp
    </button>

</div>

<script src="calculator.js"></script>
<script src="script.js"></script>

</body>
</html>
